name: testing pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20          # Use exact major version (LTS in 2026); or 'lts/*' / '20.x'
          cache: 'npm'              # Automatically caches node_modules & package-lock

      - name: Install dependencies
        run: npm ci                 # Preferred in CI: clean install, respects lockfile exactly

      - name: Run tests
        run: npm test               # Or npm run test / npm run ci:test — whatever your script is

      # Optional: Add linting (uncomment if you have a lint script)
      # - name: Run lint
      #   run: npm run lint

      # Optional: Build check (uncomment if your project has a build step)
      # - name: Build project
      #   run: npm run build   # ← npm run test and npm 


